<div class="card">
  <h3>📖 中药性能歌</h3>
  <p>
    中药共有几性能？四气五味及归经；<br>
    还有升降与浮沉，有毒无毒统而成。
  </p>
  <h3>📖 四气歌</h3>
  <p>
    四气寒凉与温热，寒凉属阴温热阳；<br>
    温热补火助阳气，温里散寒功表彰。<br>
    寒凉清热并泻火，解毒又把血来凉；<br>
    寒者热之热者寒，治疗大法此为纲。
  </p>
  <h3>📖 五味歌</h3>
  <p>
    五味酸苦甘辛咸，治病疗效不同焉；<br>
    辛行气血又发散，甘和补中急能缓。<br>
    苦燥降泄又坚阴，咸泄散结而软坚；<br>
    酸者固涩能收敛，淡渗利水要记全。
  </p>
