<h1>🌿 中药的用药禁忌</h1>

<div class="card">
  <h3>📖 十八反</h3>
  <p>
    本草明言十八反，半蒌贝蔹及攻乌，<br>
    藻戟遂芫俱战草，诸参辛芍叛藜芦。
  </p>
  <h3>📖 十九畏</h3>
  <p>
    硫黄原是火中精，朴硝一见便相争，<br>
    水银莫与砒霜见，狼毒最怕密陀僧，<br>
    巴豆性烈最为上，偏与牵牛不顺情，<br>
    丁香莫与郁金见，牙硝难合荆三棱，<br>
    川乌草乌不顺犀，人参最怕五灵脂，<br>
    官桂善能调冷气，若逢石脂便相欺，<br>
    大凡修合看顺逆，制药配方莫相依。
  </p>
  <h3>📖 妊娠禁忌</h3>
  <p>
    斑蝥水蛭及虻虫，乌头附子配天雄，<br>
    野葛水银并巴豆，牛膝薏苡与蜈蚣，<br>
    三棱芫花代赭麝，大戟蝉蜕黄雌雄，<br>
    牙硝芒硝牡丹桂，槐花牵牛皂角同，<br>
    半夏南星及通草，瞿麦干姜桃仁通，<br>
    硇砂干漆蟹爪甲，地胆茅根都失中。
  </p>
</div>
