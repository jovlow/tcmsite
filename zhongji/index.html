<div class="card">
  <h3>📖 五脏歌诀</h3>
  <p>
    心主通明火宜降，心主血脉主神明。<br>
    藏身志喜体合脉，窍舌液汗华在面。<br>
    <br>
    肺为华盖为娇脏，喜润恶燥气宣降。<br>
    肺主气又司呼吸，通调水道朝百脉。<br>
    藏魄体皮华在毛，窍鼻液涕志悲忧。<br>
    <br>
    脾主运化主统血，喜燥恶湿气宜升。<br>
    藏意志思体肉肢，窍口华唇液为涎。<br>
    <br>
    肝主升发为刚脏，喜条达而恶抑郁。<br>
    主水调津畅气机，藏血调量防出血。<br>
    藏魂志怒体合筋，窍目液泪华在爪。<br>
    <br>
    肾主蛰藏水宜升，恶燥藏精髓化血。<br>
    主水调津主纳气，藏志志恐华在发。<br>
    在体合骨又荣齿，窍耳二阴液为唾。
  </p>
